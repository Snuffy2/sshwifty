# This unprivileged workflow runs on pull_request events and captures bounded
# PR metadata as an artifact. The paired PR Summary workflow runs separately
# with write permissions so untrusted PR code is never checked out in a
# privileged job.

name: PR Summary Context

on:
  pull_request:
    types:
      - opened

permissions:
  contents: read
  pull-requests: read

jobs:
  collect-context:
    name: Collect PR Context
    runs-on: ubuntu-latest
    steps:
      - name: Collect Pull Request Context
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs/promises');

            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            let patchCharacters = 0;
            const maxPatchCharacters = 120000;
            const summarizedFiles = [];

            for (const file of files.slice(0, 200)) {
              const patch = file.patch || '';
              const remainingPatchCharacters = Math.max(maxPatchCharacters - patchCharacters, 0);
              const limitedPatch = patch.slice(0, Math.min(patch.length, remainingPatchCharacters));
              patchCharacters += limitedPatch.length;

              summarizedFiles.push({
                filename: file.filename,
                previous_filename: file.previous_filename || null,
                status: file.status,
                additions: file.additions,
                deletions: file.deletions,
                changes: file.changes,
                patch: limitedPatch,
                patch_truncated: limitedPatch.length < patch.length,
              });
            }

            const payload = {
              repository: context.repo,
              pull_request: {
                number: pr.number,
                title: pr.title,
                body: pr.body || '',
                author: pr.user.login,
                base: {
                  ref: pr.base.ref,
                  sha: pr.base.sha,
                },
                head: {
                  ref: pr.head.ref,
                  sha: pr.head.sha,
                  repository: pr.head.repo.full_name,
                },
                html_url: pr.html_url,
              },
              files: summarizedFiles,
              file_count: files.length,
              files_truncated: summarizedFiles.length < files.length,
              patches_truncated: summarizedFiles.some((file) => file.patch_truncated),
            };

            await fs.mkdir('pr-summary-context', { recursive: true });
            await fs.writeFile(
              'pr-summary-context/context.json',
              `${JSON.stringify(payload, null, 2)}\n`,
            );

      - name: Upload Pull Request Context
        uses: actions/upload-artifact@v4
        with:
          name: pr-summary-context
          path: pr-summary-context/context.json
          if-no-files-found: error
          retention-days: 1
